# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
# location: europe-west1 Location is ignored, Publish does it default in us-central1
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
      secret: projects/591461101049/secrets/NEXT_PUBLIC_GOOGLE_MAPS_API_KEY/versions/1
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
      secret: projects/591461101049/secrets/NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID/versions/1
    - variable: GEMINI_API_KEY 
      secret: projects/591461101049/secrets/GEMINI_API_KEY/versions/1
    - variable: GOOGLE_API_KEY 
      secret: projects/591461101049/secrets/GOOGLE_API_KEY/versions/1